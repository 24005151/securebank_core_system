<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SecureBank Core System{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div>
                <h1>SecureBank Core System</h1>
                <p class="subtitle">Protected Banking Operations Prototype</p>
            </div>

            <nav class="top-nav">
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/login" class="nav-link">Login</a>
                {% if user is defined and user %}
                    <span class="user-chip">Signed in as {{ user.username }} ({{ user.role }})</span>
                    <button id="logout-btn" type="button" class="small-btn">Logout</button>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container app-shell">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
