{% extends "base.html" %}

{% block title %}Dashboard - SecureBank Core System{% endblock %}

{% block content %}
<section class="card">
    <h2>Create Customer</h2>

    <form id="customer-form">
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" maxlength="100" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" maxlength="120" required>
        </div>

        <div class="form-group">
            <label for="account_number">Account Number</label>
            <input type="text" id="account_number" name="account_number" maxlength="20" required>
        </div>

        <div class="form-group">
            <label for="balance">Opening Balance</label>
            <input type="number" id="balance" name="balance" min="0" value="0" required>
        </div>

        <button type="submit">Create Customer</button>
    </form>

    <p id="message"></p>
</section>

<section class="card">
    <div class="section-header">
        <h2>Customer Records</h2>
        <button id="refresh-btn" type="button">Refresh</button>
    </div>

    <div id="customer-list"></div>
</section>
{% endblock %}
