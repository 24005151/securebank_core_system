{% extends "base.html" %}

{% block title %}Dashboard - SecureBank Core System{% endblock %}

{% block content %}
<section class="card">
    <h2>Create Customer</h2>

    <form id="customer-form">
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" maxlength="100" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" maxlength="120" required>
        </div>

        <div class="form-group">
            <label for="account_number">Account Number</label>
            <input type="text" id="account_number" maxlength="20" required>
        </div>

        <div class="form-group">
            <label for="balance">Opening Balance</label>
            <input type="number" id="balance" min="0" value="0" required>
        </div>

        <button type="submit">Create Customer</button>
    </form>

    <p id="message"></p>
</section>

<section class="card">
    <div class="section-header">
        <h2>Customer Records</h2>
        <div class="inline-tools">
            <input type="text" id="customer-search" placeholder="Search by name, email, or account">
            <button id="search-customers-btn" type="button">Search</button>
            <button id="refresh-btn" type="button">Refresh</button>
        </div>
    </div>
    <div id="customer-list"></div>
</section>

<section class="card">
    <h2>Deposit</h2>
    <form id="deposit-form">
        <div class="form-group">
            <label for="deposit-account">Account Number</label>
            <input type="text" id="deposit-account" required>
        </div>

        <div class="form-group">
            <label for="deposit-amount">Amount</label>
            <input type="number" id="deposit-amount" min="1" required>
        </div>

        <div class="form-group">
            <label for="deposit-description">Description</label>
            <input type="text" id="deposit-description" maxlength="255">
        </div>

        <button type="submit">Deposit Funds</button>
    </form>
</section>

<section class="card">
    <h2>Withdraw</h2>
    <form id="withdraw-form">
        <div class="form-group">
            <label for="withdraw-account">Account Number</label>
            <input type="text" id="withdraw-account" required>
        </div>

        <div class="form-group">
            <label for="withdraw-amount">Amount</label>
            <input type="number" id="withdraw-amount" min="1" required>
        </div>

        <div class="form-group">
            <label for="withdraw-description">Description</label>
            <input type="text" id="withdraw-description" maxlength="255">
        </div>

        <button type="submit">Withdraw Funds</button>
    </form>
</section>

<section class="card">
    <h2>Transfer</h2>
    <form id="transfer-form">
        <div class="form-group">
            <label for="from_account_number">From Account</label>
            <input type="text" id="from_account_number" required>
        </div>

        <div class="form-group">
            <label for="to_account_number">To Account</label>
            <input type="text" id="to_account_number" required>
        </div>

        <div class="form-group">
            <label for="transfer_amount">Amount</label>
            <input type="number" id="transfer_amount" min="1" required>
        </div>

        <div class="form-group">
            <label for="transfer_description">Description</label>
            <input type="text" id="transfer_description" maxlength="255">
        </div>

        <button type="submit">Transfer Funds</button>
    </form>
</section>

<section class="card">
    <div class="section-header">
        <h2>Transaction History</h2>
        <div class="inline-tools">
            <input type="text" id="transaction-account-filter" placeholder="Filter by account number">
            <select id="transaction-type-filter">
                <option value="">All Types</option>
                <option value="deposit">Deposit</option>
                <option value="withdraw">Withdraw</option>
                <option value="transfer">Transfer</option>
            </select>
            <button id="filter-transactions-btn" type="button">Filter</button>
            <button id="refresh-transactions-btn" type="button">Refresh</button>
        </div>
    </div>
    <div id="transaction-list"></div>
</section>

<section class="card">
    <div class="section-header">
        <h2>Audit Log</h2>
        <button id="refresh-audit-btn" type="button">Refresh</button>
    </div>
    <div id="audit-list"></div>
</section>
{% endblock %}
